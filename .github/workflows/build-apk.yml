name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify dependencies installed
        run: |
          test -f node_modules/.bin/next || { echo "next binary missing — yarn install --frozen-lockfile
          test -f node_modules/.bin/cap || { echo "capacitor CLI missing — yarn install --frozen-lockfile

      - name: Build web + sync Capacitor
        run: npm run build:android

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: daftar-raz-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
